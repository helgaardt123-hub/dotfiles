# --- BACKEND ---
backend = "glx";
vsync = true;

# --- TRANSPARENCY ---
# This ensures Terminator stays transparent
active-opacity = 1.0;
inactive-opacity = 0.85;
frame-opacity = 0.7;

# --- SHADOWS ---
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.7;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'i3-frame'"
];

# --- FADING ---
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;
