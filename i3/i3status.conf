general {
    colors = true
    interval = 5
    color_good = "#50fa7b"
    color_degraded = "#f1fa8c"
    color_bad = "#ff5555"
}

order += "disk /"
order += "disk /mnt/storage"
order += "cpu_usage"
order += "memory"
order += "tztime local"

disk "/mnt/storage" {
    format = " %avail" 
}

cpu_usage {
    format = " %usage"
}

memory {
    format = " %available"
}

tztime local {
    format = " %H:%M"
}
