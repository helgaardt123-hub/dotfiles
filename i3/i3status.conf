# --- i3status configuration file ---
# Path: /mnt/storage/dotfiles/i3/i3status.conf

general {
    colors = true
    interval = 5
    color_good = "#50fa7b"
    color_degraded = "#f1fa8c"
    color_bad = "#ff5555"
}

# The Order you requested
order += "disk /"
order += "disk /mnt/storage"
order += "wireless _first_"
order += "ethernet _first_"
order += "cpu_usage"
order += "cpu_temperature 0"
order += "memory"
order += "tztime local"

# --- INTERNAL STORAGE (20GB Root) ---
disk "/" {
    format = "󱂵 /: %avail"
}

# --- LVM STORAGE (440GB Data) ---
disk "/mnt/storage" {
    format = " LVM: %avail"
}

# --- WIFI & IP ---
wireless _first_ {
    format_up = " %essid (%ip)"
    format_down = " Down"
}

# --- ETHERNET ---
ethernet _first_ {
    format_up = "󰈀 %ip"
    format_down = "󰈀 Down"
}

# --- CPU PERCENTAGE ---
cpu_usage {
    format = " %usage"
}

# --- CPU TEMP ---
cpu_temperature 0 {
    format = " %degrees°C"
    path = "/sys/class/thermal/thermal_zone0/temp"
}

# --- MEMORY ---
memory {
    # Using a simpler Nerd Font RAM icon
    format = "󰍛 %percentage_used"
    threshold_degraded = "10%"
    format_degraded = "MEMORY LOW: %free"
}

# --- TIME ---
tztime local {
    format = " %H:%M"
}
