# --- THEME & UI ---
set colorscheme dracula
set draw_borders both
set display_size_in_main_column true

# --- FEATURES ---
set preview_images true
set preview_images_method ueberzug
set vcs_aware true  # Shows Git status for your e-commerce projects!

# --- CUSTOM KEYBINDINGS ---
# We added this to make navigation faster
map gd cd /mnt/storage/Projects
map gs cd /mnt/storage/dotfiles
